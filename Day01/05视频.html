<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<!--controls表示控件-->
<video src="../videos/1.mp4" width="500px" controls></video>
<!--其他属性-->
<!--loop表示循环播放-->
<!--autoplay表示自动播放-->
<!--muted表示静音播放-->
<!--poster表示显示的图片-->
<video src="../videos/1.mp4" width="500px" controls loop autoplay muted poster="../images/4.jpg"></video>

<!--&lt;!&ndash;兼容写法&ndash;&gt;--> -->
</body>
</html>
