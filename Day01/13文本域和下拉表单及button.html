<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<form action="#">
<!--    这个是多行文本编辑控件-->
<!--    placeholder表示显示，rows表示文本行数（默认为2），cols表示文本列数（默认为20）-->
    <textarea name="hahah" placeholder="请输入" rows="2" cols="3"></textarea>


<!--    下拉控件-->
<!--    select表示容器-->
<!--    option表示选项-->
<!--    selectd表示默认选择-->
    <select name="hahahafff">
        <option value="1">小明</option>
        <option value="2" selected>小红</option>
        <option value="3">小蓝</option>
        <option value="4">小花</option>
    </select>



<!--    button控件-->
<!--    disabled表示是否可以点击-->
    <button disabled>登录</button>

</form>
</body>
</html>
