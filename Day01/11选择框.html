<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<form action="#">
<!--    单选-->
<!--    checked表示默认被选择-->
<!--    注意，单选一定是同样的name-->
    <input type="radio" name="sex" value="0" checked="checked">小明
    <input type="radio" name="sex" value="1">小红

<!--    多选-->
    <input type="checkbox" name="asd" value="0">篮球
    <input type="checkbox" name="asd" value="1">足球
    <input type="checkbox" name="asd" value="2">羽毛球
</form>
</body>
</html>
