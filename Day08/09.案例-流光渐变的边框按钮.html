<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        a {
            text-decoration: none;
        }

        .btn1 {
            overflow: hidden;
            position: relative;
            display: block;
            width: 140px;
            height: 60px;
            margin: 100px;
            border-radius: 6px;
            text-align: center;
            line-height: 54px;
            background-color: pink;
            padding: 3px;
        }

        /*    彩色盒子*/
        .btn1::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 200%;
            height: 100%;
            background-color: #fff;
            background: linear-gradient(115deg, #4fcf70, #fad648, #a767e5, #12bcfe);
            animation: move .75s linear infinite;
            background-size: 50% 100%;
        }
        .btn1 span {
            position: relative;
            display: block;
            width: 100%;
            height: 100%;
            background-color: #000;
            border-radius: 3px;
            color: white;
        }

        @keyframes move {
            to {
                transform: translateX(-50%);
            }
        }

    </style>
</head>
<body>
<!--方式一-->
<a href="#" class="btn1">
        <span>
            开始按钮
        </span>
</a>
</body>
</html>
