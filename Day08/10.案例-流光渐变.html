<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .btn1 {
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 300px;
            height: 200px;
            position: relative;
            border: 1px solid #333;
            border-radius: 10px;
            margin: 50px;
            color: #FFFFFF;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            line-height: 200px;

        }
        .btn1::before {
            content: '';
            position:absolute;
            /*top: 0;*/
            /*left: 0;*/
            width: 500px;
            height: 500px;
            background: conic-gradient(transparent,transparent,transparent ,skyblue);
            animation: rotate 1s linear infinite;
            z-index: -1;
        }
        .btn1::after {
            content: '';
            position:absolute;
            /*top: 3px;*/
            /*left: 3px;*/
            /*bottom: 3px;*/
            /*right: 3px;*/
            /*等价于上面*/
            /*从 .btn1 的四边各往里缩 3px。*/
            inset: 3px;
            background-color: #000;
            border-radius: 10px;
            z-index: -1;
        }
        @keyframes rotate {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
<div class="btn1">
    渐变边框
</div>
</body>
</html>
