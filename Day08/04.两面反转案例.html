<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .box {
            height: 600px;
            width: 600px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
            position: relative;
        }
        .box > * {
            position: absolute;
        }

        .beform {
            width: 200px;
            height: 400px;
            text-align: center;
            line-height: 400px;
            color: white;
            background-color: pink;
            transition: all .3s;
            /*表示层级，默认是0，层级越大表示在上层*/
            z-index: 1;
            /*表示到后面就隐藏*/
            backface-visibility: hidden;
        }
        .box:hover .beform{
            transform: rotateY(-180deg);
        }
        .after {
            width: 200px;
            height: 400px;
            text-align: center;
            line-height: 400px;
            color: white;
            background-color: skyblue;
            transform: rotateY(180deg);
            transition: all .3s;
            backface-visibility: hidden;
        }
        .box:hover .after {
            /*这个的意思就是最后到的角度*/
            transform: rotateY(0deg);
        }
    </style>
</head>
<body>
<!--
        需要控制盒子背面可见：backface-visibility: hidden;
-->
<div class="box">
    <div class="beform">前面</div>
    <div class="after">后面</div>
</div>
</body>
</html>
