<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .box {
            /*主轴*/
            display: flex;
            width: 500px;
            height: 100px;
            border: 1px solid red;
        }
        .box .item {
            width: 100px;
            height: 100px;
            background-color: pink;
            border-radius: 10px;
        }

    </style>
</head>
<body>
<!--
        这个是现在最主流的布局方式
        核心：
            1. 父亲控子 ： 父亲称为容器，儿子称为项目
            2. 主轴和交叉轴

        注意事项：
            1. 子元素有大小，按照给定大小进行显示
            2. 子元素没有大小，会拉伸父容器
            3. 子元素超过了容器宽度，会压缩子元素
-->
<div class="box">
    <div class="item">1</div>
    <div class="item">2</div>
    <div class="item">3</div>
</div>
</body>
</html>
