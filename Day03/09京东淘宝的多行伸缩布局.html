<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
  <style>
    * {
      padding: 0;
      margin: 0;
      box-sizing: border-box;
    }
    .box {
      width: 80%;
      margin: 20px auto;
    }
    /*这个是淘宝使用的方式*/
    .box1 {
      display: flex;
      flex-wrap: wrap;
      border: 1px solid red;
      margin-left: -8px;
      margin-right: -8px;
      background-color: green;
    }
    .box1 .item {
      /*这里是把剩余空间进行分配的*/
      /*flex: 1;*/
      /*这个是淘宝使用的*/
      flex: 0 0 16.66666%;
      height: 120px;
      margin-bottom: 16px;
      padding: 0 8px;
      background-color: yellowgreen;
    }
    .item .content {
      width: 100%;
      height: 100%;
      background-color: pink;
    }
    .footer {
      width: 80%;
      height: 120px;
      background-color: black;
      margin: 0 auto;
    }
  </style>
</head>
<body>
<!--京东的案例-->
<!--淘宝是加了一个盒子嵌套-->
<div class="box">
  <div class="box1">
    <div class="item">
      <div class="content">1</div>
    </div>
    <div class="item">
      <div class="content">2</div>
    </div>
    <div class="item">
      <div class="content">3</div>
    </div>
    <div class="item">
      <div class="content">4</div>
    </div>
    <div class="item">
      <div class="content">5</div>
    </div>
    <div class="item">
      <div class="content">6</div>
    </div>
    <div class="item">
      <div class="content">7</div>
    </div>
    <div class="item">
      <div class="content">8</div>
    </div>
    <div class="item">
      <div class="content">9</div>
    </div>
    <div class="item">
      <div class="content">10</div>
    </div>
    <div class="item">
      <div class="content">11</div>
    </div>
    <div class="item">
      <div class="content">12</div>
    </div>
    <div class="item">
      <div class="content">13</div>
    </div>
    <div class="item">
      <div class="content">14</div>
    </div>
    <div class="item">
      <div class="content">15</div>
    </div>
  </div>
</div>

<div class="footer"></div>

</body>
</html>
