<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
  /**
   * ES6使用了reset代替arguments
   */
  //这个是ES5获取实参的方式
  function data(){
    console.log(arguments)
  }
  data(1,2,3,4)//这个是一个对象


  //reset方式
  function data2(...args){
    console.log(args)
  }

  data2(1,2,3,4)//这个是一个数组，可以使用数组的方法


  //注意reset方式要放到最后
  function data3(a,b,...args){
    console.log(args)
  }

  data3(1,2,3,4)//这个是一个数组，可以使用数组的方法

</script>
</body>
</html>
