<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      .box {
        display: flex;
        width: 600px;
        height: 600px;
        gap: 20px;

      }
      .box .son {
        width: 100px;
        height: 100px;
        border: 1px solid red;
        text-align: center;
        line-height: 100px;
      }
    </style>
</head>
<body>
<h1>点击盒子会出现背景色</h1>
<div class="box">
  <div class="son">1</div>
  <div class="son">2</div>
  <div class="son">3</div>
</div>
<script>
  const elementsByClassName = document.getElementsByClassName("son");
  const color = "pink"
  for(let i=0;i<3;i++){
    elementsByClassName[i].onclick = function (){
      elementsByClassName[i].style.background = color
    }
  }
</script>
</body>
</html>
