<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ajax测试</title>
</head>
<body>
<script>
    const p = new Promise(function(resolve, reject){
        setTimeout(()=>{
            resolve("用户数据")
        },1000)
    })
    //then方法返回的是一个promise对象，对象状态由回调函数的执行结果决定
    //1. 非promise表示成功
    //表示链式调用
    let result = p.then(value => {
        console.log(value)
        return 123
    },reason=>{
        console.warn(reason)
    })
    console.log(result)
</script>
</body>
</html>
