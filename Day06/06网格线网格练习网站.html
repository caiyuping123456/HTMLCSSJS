<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .box {
            display: grid;
            grid-template-columns: repeat(4,1fr);
            grid-template-rows: repeat(3,1fr);
            max-width: 1200px;
            border: 1px solid red;
            margin: 100px auto;
            gap: 10px;
        }
        .box .item {
            height: 120px;
            background-color: pink;
        }
        .box .item:first-child {
            /*写法1*/
            /*grid-column: 1/3;*/
            /*grid-row: 1/3;*/
            /*写法2*/
            grid-column: 1/ span 2;
            grid-row: 1/ span 2;
            height: auto;

        }
    </style>
</head>
<body>
<!--
        网格线实现多个元素跨网格单元
        分为列线：列加1
        行线：行加1
        从1开始
        实现语法1：
            1. 跨列：grid-column:开始编号/结束编号
            2. 跨行：grid-row:开始编号/结束编号
            1/3：表示从第1到第3
            注意：要放到子元素上

        实现语法2：
            1. 跨列：grid-column:开始编号/结束编号
            2. 跨行：grid-row:开始编号/结束编号
            1/ span 2
            表示从1号开始：跨2个单元格

           小游戏网站：cssgridgarden.com
-->
<div class="box">
    <div class="item">1</div>
    <div class="item">2</div>
    <div class="item">3</div>
    <div class="item">4</div>
    <div class="item">5</div>
    <div class="item">6</div>
    <div class="item">7</div>
    <div class="item">8</div>
    <div class="item">9</div>
    <div class="item">10</div>
    <div class="item">11</div>
    <div class="item">12</div>
</div>
</body>
</html>
