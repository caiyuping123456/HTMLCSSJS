<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        .box {
            width: 600px;
            height: 600px;
            background-color: pink;
            display: grid;
            /* 这个就是表示3*3 ，会自动进行变化*/
            /*2 fr 表示两份*/
            grid-template-columns: 1fr 2fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
            /*表示行列都是10px*/
            gap: 10px;
            /*表示行20px 列表示30px*/
            /*gap: 20px 30px;*/
        }
        .item {
            background-color: green;

        }
    </style>
</head>
<body>
<!--
        fr表示分配轨道剩余空间的比例（1fr表示一份，总和为剩余空间，2fr表示2份，对标的flex中的flex1）
        repeat函数表示可以快速的计算需要的行数
        repate（次数，轨道尺寸）或者repate(自动填充，轨道尺寸)
-->
<div class="box">
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>


</div>
</body>
</html>
