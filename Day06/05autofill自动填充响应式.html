<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .box {
            display: grid;
            /*这个表示使用自动的分配，同时最小不能低于100px,最大只占一份*/
            grid-template-columns: repeat(auto-fill,minmax(100px,1fr));
            width: 80%;
            height: 300px;
            border: 1px solid red;
            margin: 50px auto;
            gap: 10px;
        }

        .box .item {
            height: 120px;
            background-color: pink;
        }

    </style>
</head>
<body>
<!--
        自动填充可以实现autofill
        repate(自动填充，轨道尺寸)
            auto-fill表示尽可能多创建列
            auto-fit表示尽可能拉伸填满容器
        minmax函数（）：（最小，最大）

        auto-fill和auto-fit的区别：
            fit是占满父容器
            fill是占用份数
-->

    <div class="item"></div>

</html>
