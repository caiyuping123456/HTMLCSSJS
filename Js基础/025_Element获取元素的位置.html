<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>元素位置</title>
</head>
<body>

<script>
    /**
     * 以下是 Element 上所有位置相关属性的整理表格：
     *
     * 属性	类型	含义	是否包含 padding	是否包含 border	是否包含滚动条	是否包含 margin
     * clientHeight	只读	内部可视高度	✅	❌	❌	❌
     * clientWidth	只读	内部可视宽度	✅	❌	❌	❌
     * clientTop	只读	上边框宽度	❌	✅	❌	❌
     * clientLeft	只读	左边框宽度	❌	✅	❌	❌
     * scrollHeight	只读	内容总高度（含溢出）	✅	❌	❌	❌
     * scrollWidth	只读	内容总宽度（含溢出）	✅	❌	❌	❌
     * scrollTop	读/写	垂直滚动距离	-	-	-	-
     * scrollLeft	读/写	水平滚动距离	-	-	-	-
     * offsetHeight	只读	布局占用总高度	✅	✅	✅	❌
     * offsetWidth	只读	布局占用总宽度	✅	✅	✅	❌
     * offsetTop	只读	相对于 offsetParent 的上边距离	❌	❌	❌	❌
     * offsetLeft	只读	相对于 offsetParent 的左边距离	❌	❌	❌	❌
     * offsetParent	只读	最近的定位祖先元素	-	-	-	-
     * 补充说明
     */
</script>
</body>
</html>
