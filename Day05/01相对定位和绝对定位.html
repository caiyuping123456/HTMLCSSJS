<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>

        .father1 {
            background-color: pink;
            width: 300px;
            height: 300px;
            /*    演示相对定位*/
            /*注意，相对定位没有脱离文档流*/
            position: relative;
            left: 30px;
            top: 200px
            /*    演示绝对定位*/
            /*使用绝对定位会脱离文档流*/
            /*position: absolute;*/
            /*left: 300px;*/
            /*top: 300px;*/

        }

        .father2 {
            background-color: green;
            width: 300px;
            height: 300px;
        }

        .son1 {
            background-color: gray;
            width: 100px;
            height: 100px;
            position: absolute;
            left: 50px;
            top: 30px;
            /*    演示*/
        }

        .son2 {
            background-color: red;
            width: 100px;
            height: 100px;
        }
    </style>
</head>
<body>
<!--
         记住，相对定位不会脱离文档流relative
         绝对定位会脱离文档流absolute
         如果所有祖先元素都是 static（默认值），那么它会相对于初始包含块（通常是 <html> 或视口 viewport）进行定位。
         ps 绝对定位是相对上一级的
         在实际的开发中，记住：子绝父相

-->
<div class="father1">
    <div class="son1">
        as
    </div>
    <div class="son2">
        we
    </div>
</div>
<div class="father2">

</div>

</body>
</html>
