<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        div {
            width: 100px;
            height: 100px;
            background-color: pink;
            border: 30px solid green;
            padding: 30px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
<!--
    padding和mborder会导致盒子变大 margin不会
    可以使用box-size的方式进行计算
        content-box(默认) width = 内容高度
        border-box  width = border + padding + 内容高度
-->
<div>woshi1</div>
</body>
</html>
