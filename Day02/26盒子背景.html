<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        .a {
            width: 600px;
            height: 600px;
            background-image: url("../images/2.jpg");
            /*默认是重复的,可以设置是x轴重复还是y轴重复*/
            background-repeat: no-repeat;
            /*从左上角开始,第一个是x轴,第二个是y轴*/
            background-position: 10px 10px;
            background-size: 100px;
            /*默认是滚动*/
            background-attachment: fixed;
        }
    </style>
</head>
<body>
<!--
    backg有很多相关的属性:
        background-color: 背景颜色
        background-image: 背景图片
        background-repeat: 背景图片是否重复
        background-position: 定位背景图片的位置
        background-size: 背景图片大小
        background-attachment: 背景图片会不会随页面滚动
-->
<div class="a">
    <div class="a">
        <div class="a">
            <div class="a">


</div>
</body>
</html>
