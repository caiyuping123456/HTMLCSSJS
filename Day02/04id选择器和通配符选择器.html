<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        #a {
            color: red;
        }

        /*
            通配符选择器
                匹配所有元素
        */

        * {
            background-color: pink;
        }
    </style>
</head>
<body>

<div>a</div>
<!--这个就是id选择器-->
<!--注意只能使用一次-->
<div id="a">a</div>
<div>a</div>
<div>a</div>


</body>
</html>
