<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        /*这个就是类型选择器*/
        p{
            color: red;
        }
    </style>
</head>
<body>
<!--类型选择器就是选择对的标签-->
<!--
    基础选择器：
        1. 类型选择器：p span
            后来者居上，就是后面的会把前面的覆盖
        2. 类选择器

        3. id选择器
        4. 通配符选择器

-->
<p>这是一个类型选择器</p>
<p>这也是一个类型选择器</p>
<h1>hahahah</h1>
<span>hehehehe</span>
</body>
</html>
