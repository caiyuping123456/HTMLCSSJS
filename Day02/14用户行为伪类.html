<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        div {
            width: 500px;
            height: 500px;
            background-color: red;
        }
        /*表示鼠标经过元素*/
        div:hover {
            width: 100px;
            height: 100px;
            background-color: green;
        }
        /*表示获得焦点的时候*/
        input:focus {
            background-color: red;
        }

    </style>
</head>
<body>
<!--用户通过某种方式交互时就会改变样式-->
<!---->
<div>
    你好
</div>

<input type="text" class="search">
</body>
</html>
