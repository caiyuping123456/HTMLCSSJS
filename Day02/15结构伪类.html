<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        li {
            border-top: 2px;
        }
        /*:first-child表示一组兄弟中的第一个元素*/
        ul li:first-child {
            color: red;
        }

        /*:last-child表示一组兄弟中的最后一个元素*/
        ul li:last-child {
            color: blue;
        }

        /*:nth-child表示一组兄弟中的第几个元素*/
        /*注意，这里可以有很多好玩的
               :nth-child(3n)表示3的倍数
               :nth-child(odd)表示奇数
               :nth-child(even)表示偶数
               :nth-child(-n+3)表示前三个
            */
        ul li:nth-child(4) {
            color: green;
        }

        .a {
            margin: 0 auto;
            text-align: center;
        }
        .a tr th {
            width: 40px;
            border-left: 2px solid ;
        }
        /*这个就是伪类*/
        .a tr th:first-child {
            border-left: none;
        }


        .b {
            /*表示合并相邻边框*/
            border-collapse: collapse;
        }
        .b th{
            background-color: skyblue;
            text-align: center;
            width: 100px;
        }
        .b td {
            text-align: center;
            width: 100px;
        }
        .b tr:nth-child(odd) {
            background-color: pink;
        }
        .b tr:hover{
            background-color: gray;
        }

    </style>
</head>
<body>
<!--使用场景：
        选择第一个或者最后一个，或者第n个
-->
<ul>
    <li>我是1</li>
    <li>我是2</li>
    <li>我是3</li>
    <li>我是4</li>
    <li>我是5</li>
</ul>

<table class="a">
    <tr>
        <th>a</th>
        <th>b</th>
        <th>c</th>
    </tr>
</table>

<table class="b">
    <tr>
        <th>a</th>
        <th>b</th>
        <th>c</th>
    </tr>
    <tr>
        <td>a</td>
        <td>b</td>
        <td>c</td>
    </tr>
    <tr>
        <td>a</td>
        <td>b</td>
        <td>c</td>
    </tr>
    <tr>
        <td>a</td>
        <td>b</td>
        <td>c</td>
    </tr>
    <tr>
        <td>a</td>
        <td>b</td>
        <td>c</td>
    </tr>
    <tr>
        <td>a</td>
        <td>b</td>
        <td>c</td>
    </tr>
    <tr>
        <td>a</td>
        <td>b</td>
        <td>c</td>
    </tr>
</table>
</body>
</html>
