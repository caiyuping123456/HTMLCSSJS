<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        /*相邻兄弟选择器
            这里是指定下一个*/
        h2+p {
            color: red;
        }

        /*这个是通用兄弟选择器
            后面所有的*/
        h2~p {
            color: pink;
        }
    </style>
</head>
<body>
<p>a</p>
<p>b</p>
<p>c</p>
<h2>我是h2</h2>
<p>d</p>
<p>e</p>
<p>f</p>
<p>g</p>

</body>
</html>
