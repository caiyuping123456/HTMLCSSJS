<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

</head>
<body>
<!--所有的元素都是被一个个盒子包围，学会盒子模型就可以实现精确的布局，处理元素排列的关键-->
<!--可以分为两种盒子：
    1. 区块盒子：
        盒子会换行
        wight和height属性可以发挥作用
        不设置宽度默认和父亲空间的100%
        内边距，外边距和边框会撑大元素
        常见的比如：div,p,h,ul,table等

    2. 行内盒子：
        盒子不会换行
        wight和height属性不起作用
        垂直方向的内边距，外边距不起作用
        水平方向的内边距，外边距会起作用
        常见的比如：span,em,a,strong

    盒子模型整体上适用于区块盒子，包括内容，内边距，外边距，边框四个部分
    从内到外：盒子内容===> 内边距padding ===> 边框border ===> 外边距margin
-->
</body>
</html>
