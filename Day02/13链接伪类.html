<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        /*LVHA*/
        /*表示没有访问的样式*/
        a:link{
            color: red;
            text-decoration: none;
        }
        /*表示访问后的样式*/
        a:visited{
            color: green;
        }
        /*表示鼠标悬停的样式*/
        a:hover{
            color: yellowgreen;
            text-decoration: underline;
        }
        /*表示鼠标点击瞬间的样式*/
        a:active{
            color: blue;
            text-decoration: none;
        }
    </style>
</head>
<body>
<a href="#">
    这个是链接伪类
</a>
</body>
</html>
