<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        .a {
            width: 600px;
            height: 600px;
            background-color: skyblue;
            /*三个值，边框粗细，边框样式，边框颜色 （没有先后）*/
            /*边框：dotted表示点状边框 dashed表示虚线边框 solid表示实线边框*/
            /*border: 100px solid red;*/
            /*同时可以指定4个方向的边框*/
            border-top: 100px solid red;
            border-left: 100px dotted green;
            border-right: 40px solid pink;
            border-bottom: 20px solid yellowgreen;
        }
    </style>
</head>
<body>
<div class="a">

</div>
</body>
</html>
