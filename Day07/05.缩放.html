<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .box .son1 {
            width: 100px;
            height: 100px;
            background-color: pink;
        }

        .box .son1:hover {
            /*这个表示扩大倍数*/
            transform: scale(1.5);
        }
        .box .son2 {
            width: 100px;
            height: 100px;
            background-color: skyblue;
        }

    </style>
</head>
<body>
<!--
        缩放不改变原始位置
        使用scale设置
-->
<div class="box">
    <div class="son1">

    </div>
    <div class="son2"></div>
</div>
</body>
</html>
