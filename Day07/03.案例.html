<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        .box {
            display: flex;
            gap: 10px;
            height: 100px;
            justify-content: center;
            align-items: center;
        }
        .box .item {
            width: 100px;
            height: 100px;
            background-color: pink;
            position: relative;
            transition: all .3ms;
            overflow: hidden;
        }
        .box .item:hover {
            border: 1px solid green;
        }
        .box .item:hover .mack{
            transform: translateY(-30px);
        }
        .item .mack {
            height: 30px;
            width: 100%;
            background-color: green;
            position: absolute;
            bottom: -30px;
            transition: all .3s;
        }
    </style>
</head>
<body>
<div class="box">
    <div class="item">
        <div class="mack"></div>
    </div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
</div>
</body>
</html>
